<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AuraCRM Google Authentication</title>
</head>
<body>
  <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; background: #0f172a; color: #fff;">
    <h3 style="margin-bottom: 8px;">Authenticating...</h3>
    <p style="font-size: 12px; color: #94a3b8; margin: 0;">Please wait while we establish a secure connection.</p>
  </div>
  <script>
    (function() {
      // Extract parameters from URL fragment hash
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const idToken = params.get('id_token');
      
      if (window.opener) {
        if (idToken) {
          window.opener.postMessage({ type: 'GOOGLE_AUTH_SUCCESS', idToken }, window.location.origin);
        } else {
          const error = params.get('error') || 'unknown';
          window.opener.postMessage({ type: 'GOOGLE_AUTH_FAILURE', error }, window.location.origin);
        }
      }
      window.close();
    })();
  </script>
</body>
</html>
